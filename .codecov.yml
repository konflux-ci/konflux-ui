codecov:
  require_ci_to_pass: true

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 85%
        informational: true

ignore:
  - "**/*__data__*/*.ts"

comment:
  layout: "reach,diff,flags,files,footer"
  require_changes: true
