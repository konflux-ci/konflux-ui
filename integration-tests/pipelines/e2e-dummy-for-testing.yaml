---
apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: e2e-main-pipeline
  namespace: konflux-ui-tenant
spec:
  workspaces:
    - name: shared-data
      description: Workspace for git cloning and image building state
      optional: true
  params:
    - name: cloud-credential-key
      description: The key secret from konflux-test-infra-secret where all AWS ROSA configurations are stored.
      type: string
    - name: SNAPSHOT
      description: 'The JSON string representing the snapshot of the application under test.'
      default: '{"components": [{"name":"konflux-ui", "containerImage": "quay.io/konflux_ui_qe/konflux-ui-tests:latest"}]}'
      type: string
    - name: konflux-test-infra-secret
      description: The name of secret where testing infrastructures credentials are stored.
      type: string
    - name: oci-container-repo
      default: 'quay.io/konflux_ui_qe//konflux-ui-test'
      description: The ORAS container used to store all test artifacts.
    - name: e2e-artifacts-repo
      default: 'quay.io/konflux_ui_qe/pr-check-artefacts'
      description: The OCI repository to store E2E test artifacts (videos, screenshots, reports)
      type: string
    - name: artifact-browser-url
      description: 'URL to the artifact browser deployment. If provided, a link will be added to PR comments.'
      default: ''
      type: string
    - name: console-url
      description: 'Konflux/OpenShift console base URL'
      default: 'https://console.redhat.com/preview/application-pipeline'
      type: string
    - name: github-credentials-secret
      description: 'Secret name containing GitHub token'
      default: 'github-credentials'
      type: string
    - name: cypress-credentials-secret
      description: 'Secret name containing Cypress credentials'
      default: 'cypress-credentials'
      type: string
    - name: cypress-cloud-secret
      description: 'Secret name containing Cypress Cloud credentials'
      default: 'cypress-cloud-credentials'
      type: string
    - name: slack-credentials-secret
      description: 'Secret name containing Slack credentials'
      default: 'slack-credentials'
      type: string
    - name: oci-credentials-secret
      description: 'Secret name containing OCI registry credentials (Quay.io)'
      default: 'quay-secret'
      type: string
    - name: build-credentials-secret
      type: string
      default: build-credentials
    - name: skip-provision
      description: 'Skip provisioning Kind cluster (use existing cluster for debugging)'
      default: 'true'
      type: string
    - name: skip-deploy
      description: 'Skip deploying Konflux (use existing deployment for debugging)'
      default: 'true'
      type: string
    - name: skip-deprovision
      description: 'Skip deprovisioning Kind cluster (keep cluster for debugging)'
      default: 'true'
      type: string
    - name: skip-monitoring
      description: 'Skip deprovisioning Kind cluster (keep cluster for debugging)'
      default: 'true'
      type: string
    - name: e2e-spec-file
      description: 'Cypress test spec file to run (for debugging, run single test)'
      default: 'tests/basic-happy-path.spec.ts'
      type: string
  tasks:
    - name: konflux-ui-pr-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/konflux-ui
          - name: revision
            value: main
          - name: pathInRepo
            value: integration-tests/tasks/konflux-ui-pr-metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)
        - name: test-name
          value: $(context.pipelineRun.name)
    - name: show-snapshot-data
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/konflux-ui
          - name: revision
            value: main
          - name: pathInRepo
            value: integration-tests/tasks/show-snapshot-data.yaml
      params:
        - name: snapshot
          value: $(params.SNAPSHOT)
    - name: check-org-membership
      runAfter:
        - show-snapshot-data
        - konflux-ui-pr-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/konflux-ui
          - name: revision
            value: main
          - name: pathInRepo
            value: integration-tests/tasks/check-org-membership.yaml
      params:
        - name: job-spec
          value: $(tasks.konflux-ui-pr-metadata.results.job-spec)
        - name: github-credentials-secret
          value: $(params.github-credentials-secret)
    - name: provision-kind-cluster
      runAfter:
        - check-org-membership
      when:
        - input: '$(tasks.konflux-ui-pr-metadata.results.pull-request-author)'
          operator: notin
          values: ['red-hat-konflux[bot]']
        - input: '$(params.skip-provision)'
          operator: in
          values: ['false']
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/mapt-oci/kind-aws-spot/provision/0.2/kind-aws-provision.yaml
      params:
        - name: secret-aws-credentials
          value: $(params.konflux-test-infra-secret)
        - name: cluster-access-secret-name
          value: kfg-$(context.pipelineRun.name)
        - name: id
          value: $(context.pipelineRun.name)
        - name: tags
          value: 'owner=konflux-ui@redhat.com,project=Konflux,created-by=integration-pipeline,component=konflux-ui'
        - name: debug
          value: 'false'
        - name: ownerKind
          value: PipelineRun
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)
        - name: oci-ref
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: $(params.oci-credentials-secret)
        - name: cpus
          value: '4'
        - name: memory
          value: '16'
        - name: compute-sizes
          value: 'm5.xlarge,m5a.xlarge,m5d.xlarge,m6i.xlarge,m6a.xlarge,m7i.xlarge,t3.xlarge,t3a.xlarge'
    - name: deploy-konflux
      when:
        - input: '$(tasks.konflux-ui-pr-metadata.results.pull-request-author)'
          operator: notin
          values: ['red-hat-konflux[bot]']
        - input: '$(params.skip-deploy)'
          operator: in
          values: ['false']
      runAfter:
        - provision-kind-cluster
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/konflux-ci/deploy/0.3/deploy-konflux-ci.yaml
      params:
        - name: cluster-access-secret
          value: kfg-$(context.pipelineRun.name)
        - name: component-name
          value: ui
        - name: component-pr-owner
          value: $(tasks.konflux-ui-pr-metadata.results.pull-request-author)
        - name: component-pr-sha
          value: $(tasks.konflux-ui-pr-metadata.results.git-revision)
        - name: component-pr-source-branch
          value: $(tasks.konflux-ui-pr-metadata.results.source-repo-branch)
        - name: oci-ref
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: $(params.oci-credentials-secret)
        - name: build-credentials
          value: $(params.build-credentials-secret)
    - name: build-ui-image
      when:
        - input: '$(tasks.konflux-ui-pr-metadata.results.pull-request-author)'
          operator: notin
          values: ['red-hat-konflux[bot]']
      runAfter:
        - provision-kind-cluster
        - deploy-konflux
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/konflux-ui
          - name: revision
            value: main
          - name: pathInRepo
            value: integration-tests/tasks/build-ui-image-instrumented.yaml
      params:
        - name: git-url
          value: '$(tasks.konflux-ui-pr-metadata.results.git-url)'
        - name: git-revision
          value: '$(tasks.konflux-ui-pr-metadata.results.git-revision)'
        - name: target-branch
          value: '$(tasks.konflux-ui-pr-metadata.results.target-repo-branch)'
        - name: pull-request-number
          value: '$(tasks.konflux-ui-pr-metadata.results.pull-request-number)'
        - name: default-test-image
          value: 'quay.io/konflux_ui_qe/konflux-ui-tests:latest'
        - name: test-image-repo
          value: '$(params.oci-container-repo)'
        - name: quay-secret
          value: $(params.oci-credentials-secret)
        - name: pr-test-image
          value: 'quay.io/konflux_ui_qe/konflux-ui-tests:pr-$(tasks.konflux-ui-pr-metadata.results.pull-request-number)'
        - name: component-image
          value: '$(tasks.konflux-ui-pr-metadata.results.container-image)'
    - name: run-e2e-konflux-ui
      when:
        - input: '$(tasks.konflux-ui-pr-metadata.results.pull-request-author)'
          operator: notin
          values: ['red-hat-konflux[bot]']
      runAfter:
        - deploy-konflux
        - build-test-image
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/konflux-ui
          - name: revision
            value: main
          - name: pathInRepo
            value: integration-tests/tasks/run-e2e-konflux-ui-skipped.yaml
      params:
        - name: test-image
          value: '$(tasks.build-ui-image.results.ui-image)'
        - name: test-name
          value: '$(context.pipelineRun.name)'
        - name: git-repo
          value: '$(tasks.konflux-ui-pr-metadata.results.git-repo)'
        - name: git-url
          value: '$(tasks.konflux-ui-pr-metadata.results.git-url)'
        - name: cypress-credentials-secret
          value: $(params.cypress-credentials-secret)
        - name: cypress-cloud-secret
          value: $(params.cypress-cloud-secret)
        - name: slack-credentials-secret
          value: $(params.slack-credentials-secret)
        - name: github-credentials-secret
          value: $(params.github-credentials-secret)
        - name: oci-storage
          value: '$(params.e2e-artifacts-repo)'
        - name: oci-credentials-secret
          value: '$(tasks.konflux-ui-pr-metadata.results.git-revision)'
        - name: job-spec
          value: '$(tasks.konflux-ui-pr-metadata.results.job-spec)'
        - name: component-image
          value: '$(tasks.konflux-ui-pr-metadata.results.container-image)'
        - name: test-environment
          value: 'staging'
        - name: oci-ref
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: quay-secret
        - name: spec-file
          value: $(params.e2e-spec-file)
  finally:
    - name: deprovision-kind-cluster
      when:
        - input: '$(tasks.konflux-ui-pr-metadata.results.pull-request-author)'
          operator: notin
          values: ['red-hat-konflux[bot]']
        - input: '$(params.skip-deprovision)'
          operator: in
          values: ['false']
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/tekton-integration-catalog
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/mapt-oci/kind-aws-spot/deprovision/0.1/kind-aws-deprovision.yaml
      params:
        - name: secret-aws-credentials
          value: $(params.konflux-test-infra-secret)
        - name: id
          value: $(context.pipelineRun.name)
        - name: cluster-access-secret
          value: kfg-$(context.pipelineRun.name)
        - name: oci-container
          value: $(params.oci-container-repo):$(context.pipelineRun.name)
        - name: oci-credentials
          value: $(params.oci-credentials-secret)
