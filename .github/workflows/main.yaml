name: UI Lint & Unit Tests

# Controls when the action will run.
on:
  # Triggers the workflow on pull request events but only for the main branch
  pull_request:
    branches:
      - main
  merge_group:
    types: [checks_requested]
  # Triggers the workflow on manual dispatch
  workflow_dispatch:
  
# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # Lint, restricted imports, and type checking — runs once in parallel with test shards
  lint:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Enable Corepack 📦
        run: corepack enable

      - name: Setup ⚙️ Node.js 🔰
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'yarn'

      # e2e-tests install is needed because eslint resolves eslint-plugin-cypress from e2e-tests/.eslintrc.cjs
      - name: Install Dependencies 🥁
        run: |
          yarn install --immutable
          cd e2e-tests
          yarn install --immutable
          cd ..

      - name: Lint ✅
        run: yarn lint

      - name: Lint Restricted Imports ✅
        run: yarn lint:restricted-imports

      - name: Type Checking
        run: yarn type-checks

  # Unit tests — sharded across 2 runners for parallel execution
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v6

      - name: Enable Corepack 📦
        run: corepack enable

      - name: Setup ⚙️ Node.js 🔰
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'yarn'

      - name: Install Dependencies 🥁
        run: yarn install --immutable

      - name: Run unit tests 🧪 (shard ${{ matrix.shard }}/2)
        run: yarn test --maxWorkers=2 --coverage --silent --ci --verbose=false --shard=${{ matrix.shard }}/2
        env:
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: shard-${{ matrix.shard }}
          fail_ci_if_error: true
