name: 'Deploy Konflux CI on kind cluster and run Konflux UI E2E tests'
description: 'Reusable action for running konflux-ui E2E test against konflux-ci instance deployed on kind cluster'
inputs:
  job-type:
    description: '"on-pr" or "periodic-local" or "periodic-stage"'
    required: true

runs:
  using: "composite"
  steps:
    - name: Free Disk Space (Ubuntu)
      uses: jlumbroso/free-disk-space@main
      with:
        # this might remove tools that are actually needed,
        # if set to "true" but frees about 6 GB
        tool-cache: false
        docker-images: false

    - name: Checkout Repository
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        repository: 'konflux-ci/konflux-ci'
        path: 'konflux-ci'
        ref: 'main'

    - name: Disable AppArmor
      # works around a change in ubuntu 24.04 that restricts Linux namespace access
      # for unprivileged users
      run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      shell: bash

    - name: Install Kind
      uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1
      with:
        install_only: true

    - name: Show version information
      run: |
        : Show version information
        kubectl version --client
        kind version
      shell: bash

    - name: Deploy Konflux
      env:
        GITHUB_APP_ID: ${{ env.GH_APP_ID }}
        GITHUB_PRIVATE_KEY: ${{ env.GH_APP_PRIVATE_KEY }}
        WEBHOOK_SECRET: ${{ env.GH_APP_WEBHOOK_SECRET }}
        QUAY_TOKEN: ${{ env.QUAY_TOKEN_TEST }}
        QUAY_ORGANIZATION: ${{ env.QUAY_TEST_ORG }}
        SMEE_CHANNEL: ${{ env.SMEE_URL }}
      run: |
        : Deploy Konflux using operator-based deployment
        cd konflux-ci
        ./scripts/deploy-local.sh
      shell: bash

    - name: List namespaces
      run: |
        : List namespaces
        kubectl get namespace
      shell: bash

    - name: Build konflux-ui image
      env:
        CYPRESS_GH_TOKEN: ${{ env.HAC_TEST_GH_TOKEN }}
        TARGET_BRANCH: ${{ env.TARGET_BRANCH }}
        SOURCE_BRANCH: ${{ env.SOURCE_BRANCH }}
        PR_NUMBER: ${{ env.PR_NUMBER }}
        HEAD_SHA: ${{ env.HEAD_SHA }}
        FORKED_REPO_URL: ${{ env.FORKED_REPO_URL }}
        BASE_REPO_URL: ${{ env.BASE_REPO_URL }}
        JOB_TYPE: ${{ inputs.job-type }}
      run: |
        : Build konflux-ui image
        ./pr_check.sh build
      shell: bash

    - name: Inject custom UI image into proxy deployment
      run: |
        : Replace default UI image with instrumented build for e2e coverage
        kubectl scale deployment/konflux-operator-controller-manager \
          -n konflux-operator --replicas=0
        kubectl wait --for=delete pod -l control-plane=controller-manager \
          -n konflux-operator --timeout=2m

        kubectl patch deployment proxy -n konflux-ui --type='strategic' -p='{
          "spec": {
            "template": {
              "spec": {
                "initContainers": [
                  {
                    "name": "copy-static-content",
                    "image": "localhost/test/test:konflux-ui",
                    "imagePullPolicy": "IfNotPresent"
                  },
                  {
                    "name": "generate-nginx-configs",
                    "image": "localhost/test/test:konflux-ui",
                    "imagePullPolicy": "IfNotPresent"
                  }
                ]
              }
            }
          }
        }'

        kubectl rollout status deployment/proxy -n konflux-ui --timeout=5m
      shell: bash
